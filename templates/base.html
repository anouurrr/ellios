<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Elios – Your Inner Compass{% endblock %}</title>
   
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
                <i class="fas fa-compass me-2 rotating-compass"></i>
                <span class="brand-text">Elios</span>
            </a>
           
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="hamburger-lines">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </button>
           
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">
                            <i class="fas fa-home me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('career') }}">
                            <i class="fas fa-briefcase me-1"></i>Career
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('timetable') }}">
                            <i class="fas fa-calendar-alt me-1"></i>Timetable
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('dashboard') }}">
                            <i class="fas fa-chart-bar me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('settings') }}">
                            <i class="fas fa-cog me-1"></i>Settings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('feedback') }}">
                            <i class="fas fa-comment me-1"></i>Feedback
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer mt-5">
        <div class="container text-center py-4">
            <p class="mb-0">© 2025 Elios — Made by Armaghan</p>
        </div>
    </footer>
    <style>
    /* Hamburger menu styles */
    .hamburger-lines {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 24px;
        height: 18px;
    }
    .hamburger-lines span {
        display: block;
        height: 3px;
        width: 100%;
        background-color: white;
        border-radius: 2px;
        transition: all 0.3s ease;
    }
    .navbar-toggler:focus {
        box-shadow: none;
        border: none;
    }
    .navbar-toggler[aria-expanded="true"] .hamburger-lines span:nth-child(1) {
        transform: rotate(45deg) translate(6px, 6px);
    }
    .navbar-toggler[aria-expanded="true"] .hamburger-lines span:nth-child(2) {
        opacity: 0;
    }
    .navbar-toggler[aria-expanded="true"] .hamburger-lines span:nth-child(3) {
        transform: rotate(-45deg) translate(6px, -6px);
    }
    </style>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
   
    {% block scripts %}{% endblock %}
</body>
</html>
