{% extends "base.html" %}
{% block title %}Settings - Elios{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-cog" style="font-size: 3rem; color: var(--primary-color);"></i>
                        <h2 class="mt-3 mb-2">Personal Settings</h2>
                        <p class="text-muted">Customize your Elios experience</p>
                    </div>

                    <!-- Theme Settings -->
                    <div class="settings-section mb-4">
                        <h4 class="section-title">
                            <i class="fas fa-palette me-2"></i>Appearance
                        </h4>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Theme</label>
                                <select class="form-select" id="theme-select">
                                    <option value="light">Light Mode</option>
                                    <option value="dark">Dark Mode</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button class="btn btn-primary btn-lg px-5" onclick="saveSettings()">
                            <i class="fas fa-save me-2"></i>Save Settings
                        </button>
                    </div>

                    <div id="settings-status" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Dark Mode
function saveSettings() {
    const theme = document.getElementById('theme-select').value;
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('elios-theme', theme);
    
    document.getElementById('settings-status').innerHTML = `
        <div class="alert alert-success alert-dismissible fade show">
            Settings saved successfully!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
}

// Load saved theme
document.addEventListener('DOMContentLoaded', function() {
    const saved = localStorage.getItem('elios-theme') || 'light';
    document.getElementById('theme-select').value = saved;
    document.documentElement.setAttribute('data-theme', saved);
});
</script>
{% endblock %}
