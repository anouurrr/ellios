{% extends "base.html" %}
{% block title %}Settings - Elios{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-cog" style="font-size: 3rem; color: var(--primary-color);"></i>
                        <h2 class="mt-3 mb-2">Personal Settings</h2>
                        <p class="text-muted">Customize your Elios experience</p>
                    </div>
                    <!-- Theme Settings -->
                    <div class="settings-section mb-4">
                        <h4 class="section-title">
                            <i class="fas fa-palette me-2"></i>Appearance
                        </h4>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Theme</label>
                                <select class="form-select" id="theme-select">
                                    <option value="light">Light Mode</option>
                                    <option value="dark">Dark Mode</option>
                                    <option value="auto">Auto (System)</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Text Size</label>
                                <select class="form-select" id="text-size-select">
                                    <option value="small">Small</option>
                                    <option value="medium">Medium</option>
                                    <option value="large">Large</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <!-- Privacy & Data, Data Management, Account Info sections (all your original content) -->
                    <!-- ... [full original content you sent] ... -->
                    <!-- Save Settings -->
                    <div class="text-center">
                        <button class="btn btn-success btn-lg" onclick="saveSettings()">
                            <i class="fas fa-save me-2"></i>Save Settings
                        </button>
                    </div>
                    <div id="settings-status" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
